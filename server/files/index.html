<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        /* Part 3: Your styling goes here */
        /* 1. Body Styling */
body {
    font-family: 'Trebuchet MS', sans-serif;
    background-color: #f0f2f5; /* Ein leichtes Grau für den Hintergrund */
    padding: 20px;
}

/* 2. Bilder hübsch machen */
img {
    border-radius: 10px;    /* Abgerundete Ecken */
    max-width: 300px;       /* Nicht zu riesig */
    box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Ein dezenter Schatten */
}

/* 3. Überschriften */
h1 {
    font-weight: bold;
    margin-bottom: 30px;
    text-align: center;
}

/* 4. Der "Kasten" für jeden Film (article) */
article {
    background-color: white;
    border-radius: 15px;
    margin-bottom: 40px;    /* Abstand zwischen den Filmen */
    padding: 20px;          /* Abstand vom Text zum Rand des Kastens */
    box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* Tiefenwirkung */
}

/* 6. Styling für die Genre-Tags */
/* Damit das funktioniert, müssen wir im JavaScript die Genres in ein <span> packen */
.genre {
    background-color: #e1f5fe;
    color: #0288d1;
    padding: 5px 12px;
    border-radius: 20px;
    margin-right: 8px;
    display: inline-block;
    font-size: 0.9em;
    border: 1px solid #b3e5fc;
}
    </style>
    <script>
        
        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
    /* Part 2: Build the HTML elements here and append them to the body */
    
    // 1. JSON-Text in ein echtes JavaScript-Array umwandeln
    const movies = JSON.parse(xhr.responseText);

    // 2. Durch die Filme loopen
    movies.forEach(movie => {
    const movieArticle = document.createElement("article");

    // 1. Titel
    const title = document.createElement("h2");
    title.textContent = movie.Title;
    movieArticle.append(title);

    // 2. Poster
    const poster = document.createElement("img");
    poster.src = movie.Poster;
    poster.alt = `Poster for ${movie.Title}`;
    poster.style.width = "200px";
    movieArticle.append(poster);

    // 3. Allgemeine Infos (Datum, Dauer, Ratings)
    const infoP = document.createElement("p");
    infoP.innerHTML = `<strong>Released:</strong> ${movie.Released} | 
                       <strong>Runtime:</strong> ${movie.Runtime} min | 
                       <strong>Metascore:</strong> ${movie.Metascore} | 
                       <strong>IMDb:</strong> ${movie.imdbRating}`;
    movieArticle.append(infoP);

    // 4. Plot
    const plot = document.createElement("p");
    plot.innerHTML = `<strong>Plot:</strong> ${movie.Plot}`;
    movieArticle.append(plot);

    // 5. Listen-Funktion für Genres, Directors, Writers, Actors
    // Wir bauen eine kleine Hilfsfunktion für die semantischen Listen
    // 5. Genres als "Spans" (wichtig für das CSS-Styling aus Part 3)
const genreHeader = document.createElement("h3");
genreHeader.textContent = "Genres:";
movieArticle.append(genreHeader);

const genreContainer = document.createElement("div"); 
movie.Genres.forEach(g => {
    const s = document.createElement("span");
    s.classList.add("genre"); // Das aktiviert dein CSS (.genre { ... })
    s.textContent = g;
    genreContainer.append(s);
});
movieArticle.append(genreContainer);

// 6. Die restlichen Infos wieder als normale Listen
const createList = (label, dataArray) => {
    const header = document.createElement("h3");
    header.textContent = label;
    movieArticle.append(header);

    const ul = document.createElement("ul");
    dataArray.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        ul.append(li);
    });
    movieArticle.append(ul);
};

createList("Directors:", movie.Directors);
createList("Writers:", movie.Writers);
createList("Actors:", movie.Actors);

    // Trennlinie für die Optik
    movieArticle.append(document.createElement("hr"));

    // Alles in den Body einfügen
    bodyElement.append(movieArticle);

    });

                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
</body>

</html>
